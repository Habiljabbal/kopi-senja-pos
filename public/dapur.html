<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Dapur - Kopi Senja</title>
    <link rel="stylesheet" href="./output.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        if (sessionStorage.getItem('isLoggedIn') !== 'true' || sessionStorage.getItem('role') !== 'dapur') {
            alert('🔒 Akses Ditolak! Anda harus login.');
            window.location.href = 'login.html';
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen p-6 font-sans">

    <div class="max-w-4xl mx-auto flex justify-between items-center mb-6 bg-white px-6 py-3 rounded-2xl border border-gray-200">
        <div class="flex items-center gap-3">
            <span class="w-3 h-3 rounded-full bg-orange-500 animate-pulse"></span>
            <h1 class="font-bold text-gray-800 text-sm"><i class="fa-solid fa-fire-burner mr-1 text-emerald-600"></i> MONITOR DAPUR AKTIF</h1>
        </div>
        <button onclick="logoutStaf()" class="text-xs font-bold text-red-600 bg-red-50 px-3 py-1.5 rounded-xl">Keluar</button>
    </div>

    <div class="max-w-4xl mx-auto">
        <div id="kitchenGrid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
    </div>

    <script>
        function renderDapur() {
            let databasePesanan = JSON.parse(localStorage.getItem('databasePesanan')) || [];
            const grid = document.getElementById('kitchenGrid');
            if(!grid) return;
            grid.innerHTML = '';
            let adaAntrean = false;

            databasePesanan.forEach(order => {
                if (order.statusDapur === "Selesai Dihidangkan") return;
                adaAntrean = true;
                
                let itemsHtml = '';
                order.items.forEach(item => {
                    itemsHtml += `
                        <div class="flex justify-between items-center text-xs py-1 border-b border-gray-50">
                            <span class="text-gray-800">${item.nama}</span>
                            <span class="bg-gray-100 font-extrabold px-2 py-0.5 rounded text-gray-900">x${item.qty}</span>
                        </div>
                    `;
                });

                grid.innerHTML += `
                    <div class="bg-white border-2 border-emerald-500 rounded-2xl p-4 shadow-xs">
                        <div class="flex justify-between items-center mb-2 pb-2 border-b border-gray-100">
                            <div>
                                <span class="text-xs font-black bg-emerald-50 px-2 py-1 rounded">MEJA ${order.nomorMeja}</span>
                                <span class="block text-[10px] text-gray-400 mt-1">An. ${order.namaPelanggan}</span>
                            </div>
                        </div>
                        <div class="space-y-1 my-3">${itemsHtml}</div>
                        <button onclick="selesaikanMasakan('${order.idOrder}')" class="w-full bg-emerald-600 text-white text-xs font-bold py-2 rounded-xl">
                            🍽️ Selesai Masak / Sajikan
                        </button>
                    </div>
                `;
            });

            if (!adaAntrean) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 bg-white rounded-2xl text-gray-400 text-sm">✨ Belum ada pesanan masuk...</div>`;
            }
        }

        function selesaikanMasakan(idOrder) {
            let databasePesanan = JSON.parse(localStorage.getItem('databasePesanan')) || [];
            const idx = databasePesanan.findIndex(o => o.idOrder === idOrder);
            if (idx !== -1) {
                databasePesanan[idx].statusDapur = "Selesai Dihidangkan";
                localStorage.setItem('databasePesanan', JSON.stringify(databasePesanan));
                renderDapur();
            }
        }

        function logoutStaf() { sessionStorage.clear(); window.location.href = 'login.html'; }
        setInterval(renderDapur, 2000); // Sinkronisasi otomatis setiap 2 detik
        renderDapur();
    </script>
</body>
</html>
